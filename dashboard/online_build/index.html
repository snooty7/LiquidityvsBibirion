<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signal Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    window.DASHBOARD_CONFIG = {
      snapshotMode: "static",
      dataBasePath: "data"
    };
  </script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Liquidity Signal Dashboard</p>
        <h1>Signal Flow Monitor</h1>
      </div>
      <div class="controls">
        <label>
          <span>Symbol</span>
          <select id="symbolSelect"></select>
        </label>
        <button id="refreshBtn">Refresh</button>
        <div class="status">
          <span class="dot"></span>
          <span id="statusText">waiting</span>
        </div>
      </div>
    </header>

    <section class="legend">
      <div class="legend-item"><span class="swatch alert"></span> Liquidity alert</div>
      <div class="legend-item"><span class="swatch pending"></span> Pending</div>
      <div class="legend-item"><span class="swatch wait"></span> Wait</div>
      <div class="legend-item"><span class="swatch confirmed"></span> Confirmed</div>
      <div class="legend-item"><span class="swatch trade"></span> Trade in</div>
      <div class="legend-item"><span class="swatch exit"></span> Close / exit</div>
      <div class="legend-item"><span class="swatch reject"></span> Drop / skip</div>
    </section>

    <main class="grid">
      <section class="panel">
        <div class="panel-head">
          <h2>M1</h2>
          <span id="metaM1"></span>
        </div>
        <div id="chartM1" class="chart"></div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>M5</h2>
          <span id="metaM5"></span>
        </div>
        <div id="chartM5" class="chart"></div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>H1</h2>
          <span id="metaH1"></span>
        </div>
        <div id="chartH1" class="chart"></div>
      </section>
      <section class="panel">
        <div class="panel-head">
          <h2>D1</h2>
          <span id="metaD1"></span>
        </div>
        <div id="chartD1" class="chart"></div>
      </section>
    </main>

    <section class="signals">
      <div class="signals-head">
        <h2>Recent Signals</h2>
        <span id="generatedAt"></span>
      </div>
      <div id="signalCards" class="signal-cards"></div>
    </section>
  </div>

  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <script src="app.js"></script>
</body>
</html>
